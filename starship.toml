# =============================================================================
# ГЛОБАЛЬНЫЕ НАСТРОЙКИ
# =============================================================================
palette = "noctalia"
add_newline = false

# Тонкая, аккуратная структура в одну строку
format = """
$directory\
$git_branch\
$git_status\
$rust\
$lua\
$python\
$package\
$cmd_duration\
$character"""

# Главный символ ввода (минималистичная стрелка)
[character]
success_symbol = "❯ "
error_symbol = "❯ "

# Чистая папка с красивой иконкой
[directory]
format = "󰉋 $path "
truncation_length = 3
truncate_to_repo = true

# Ветка Git (Просто иконка и текст)
[git_branch]
symbol = " "
format = "on $symbol$branch "

# Статус Git (миниатюрные аккуратные индикаторы в круглых скобках)
[git_status]
format = "([$all_status$num_untracked] )"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# Окружение Rust (появится только в .rs проектах)
[rust]
symbol = " "
format = "via $symbol$version "

# Окружение Lua
[lua]
symbol = " "
format = "via $symbol$version "

# Окружение Python
[python]
symbol = " "
format = "via $symbol$version "

# Версия пакета (Cargo.toml и т.д.)
[package]
symbol = "󰏗 "
format = "$symbol$version "

# Время выполнения тяжелых команд (показывает, например, "took 2s")
[cmd_duration]
min_time = 500
format = "took $duration "

